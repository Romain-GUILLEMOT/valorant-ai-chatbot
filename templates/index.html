<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Valorant Local Pipeline</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="match-block">
        <div>
          <div id="game" class="game-id">MATCH ?</div>
          <div id="match-meta" class="match-meta">total 0ms - refresh --</div>
        </div>
        <div id="status" class="status-pill">STARTING</div>
      </div>

      <div class="scoreboard">
        <button class="score-btn" data-team="allies" data-direction="down">-</button>
        <button class="score-btn" data-team="allies" data-direction="up">+</button>
        <div class="score-team">
          <span>ALLY</span>
          <strong id="score-allies">0</strong>
        </div>
        <div class="score-sep">:</div>
        <div class="score-team enemy">
          <span>ENEMY</span>
          <strong id="score-enemies">0</strong>
        </div>
        <button class="score-btn" data-team="enemies" data-direction="down">-</button>
        <button class="score-btn" data-team="enemies" data-direction="up">+</button>
      </div>

      <button id="new-game-btn" class="reset-btn">RESET</button>
    </header>

    <section class="layout">
      <div class="main-stack">
        <section class="duels-grid" id="duels"></section>
        <section class="players-panel" id="players"></section>
      </div>
      <aside class="side-panel">
        <div class="side-title">SHORTCUTS</div>
        <div id="shortcut-list" class="prompt-list"></div>
        <div class="side-title">AI PROMPTS</div>
        <div id="prompt-list" class="prompt-list"></div>
        <div class="side-title">LAST DEATHS</div>
        <div id="death-log" class="death-log"></div>
        <div class="side-title">AI</div>
        <div id="ai-status" class="ai-status">idle</div>
      </aside>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
